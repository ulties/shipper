# Shipper Configuration
# This file defines deployable projects and their deployment profiles

# Provider configurations (credentials, API keys, etc.)
providers:
  ploi:
    api_key: "${PLOI_API_KEY}" # Set via environment variable
    api_url: "https://ploi.io/api"
    server_id: "105556" # Default server ID for all deployments
    deployment_timeout: 60 # Maximum time (in seconds) to wait for deployment to complete

# Projects to deploy
projects:
  # Example Laravel API
  api:
    provider: ploi
    path: ./examples/api
    # Repository configuration
    repository:
      provider: github # github, gitlab, bitbucket, or custom
      name: ulties/shipper # username/repository
# Site configuration
    web_directory: /public # Default Laravel public directory
    project_root: /
    php_version: "8.3"
    # SSL configuration
    ssl:
      enabled: true
      type: letsencrypt
      force_https: true
    # Environment variables
    environment:
      variables:
        APP_NAME: "Shipper API"
        LOG_CHANNEL: "stack"
        DB_CONNECTION: "mysql"
    # Deploy script
    deploy_script: |
      composer install --no-dev --optimize-autoloader
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
    # Database configuration
    databases:
      main:
        name: "shipper_cli_${PROJECT_NAME}_${PROFILE}_${GITHUB_PR_NUMBER}"
        user: "shipper_cli_${PROJECT_NAME}_${PROFILE}_${GITHUB_PR_NUMBER}"
        type: mysql
    # Queue workers
    queues:
      default:
        enabled: true
        connection: database
        queue: default
        processes: 1
        max_tries: 1
        timeout: 60
        max_seconds: 60
        sleep: 30
        restart_on_deploy: true
      emails:
        enabled: true
        connection: redis
        queue: emails
        processes: 3
        max_tries: 3
        timeout: 120
        max_seconds: 120
        sleep: 10
        restart_on_deploy: true
    # Cron jobs
    cron:
      scheduler:
        command: "php artisan schedule:run"
        frequency: "* * * * *"
        user: "ploi"
        enabled: true
      backup:
        command: "php artisan backup:run"
        frequency: "0 2 * * *"
        user: "ploi"
        enabled: true
    # Daemon processes
    daemons:
      websocket:
        command: "php artisan websockets:serve"
        user: "ploi"
        processes: 1
        directory: "/home/ploi/{site}"
        enabled: true
        restart_delay: 10
      horizon:
        command: "php artisan horizon"
        user: "ploi"
        processes: 1
        directory: ""
        enabled: true
        restart_delay: 10
    # Network rules (firewall)
    network_rules:
      allow-redis:
        name: "Allow Redis"
        port: 6379
        type: tcp
        rule_type: allow
        from_ip: "10.0.0.0/8"
      allow-ssh:
        name: "Allow SSH"
        port: 22
    # Redirects
    redirects:
      www-to-non-www:
        from: "/old-api"
        to: "/api/v2"
        type: "redirect"
        enabled: true
      legacy:
        from: "/legacy"
        to: "/v2"
        type: "permanent"
        enabled: true
    profiles:
      production:
        branch: main
        domain: shipper-cli-api-production.ulties.dev
        environment:
          variables:
            APP_ENV: "production"
            APP_DEBUG: "false"
        deploy_script: |
          composer install --no-dev --optimize-autoloader
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache --force
        aliases:
          - "www.shipper-cli-api-production.ulties.dev"
          - "api-v2.shipper-cli-api-production.ulties.dev"
      staging:
        branch: develop
        domain: shipper-cli-api-staging.ulties.dev
        environment:
          variables:
            APP_ENV: "staging"
            APP_DEBUG: "true"
      preview:
        branch: "${GITHUB_HEAD_REF}" # PR branch
        domain: "shipper-cli-api-preview-${GITHUB_PR_NUMBER}.ulties.dev"
        environment:
          variables:
            APP_ENV: "preview"
            APP_DEBUG: "true"

  # Example Frontend App
  frontend:
    provider: ploi
    path: ./examples/frontend
    # Repository configuration
    repository:
      provider: github
      name: ulties/shipper
    # Site configuration
    web_directory: /public
    project_root: /
    profiles:
      production:
        branch: main
        domain: shipper-cli-production.ulties.dev
      staging:
        branch: develop
        domain: shipper-cli-staging.ulties.dev
      preview:
        branch: "${GITHUB_HEAD_REF}"
        domain: "shipper-cli-preview-${GITHUB_PR_NUMBER}.ulties.dev"