<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGradient)"/>
  
  <!-- Cloud 1 -->
  <ellipse cx="100" cy="80" rx="40" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="130" cy="80" rx="35" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="115" cy="70" rx="30" ry="20" fill="white" opacity="0.7"/>
  
  <!-- Cloud 2 -->
  <ellipse cx="380" cy="100" rx="35" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="405" cy="100" rx="30" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="395" cy="92" rx="25" ry="15" fill="white" opacity="0.6"/>
  
  <!-- Server/Computer on left -->
  <g transform="translate(80, 200)">
    <!-- Monitor -->
    <rect x="0" y="0" width="120" height="90" rx="5" fill="url(#screenGradient)" stroke="#1e293b" stroke-width="3"/>
    <rect x="5" y="5" width="110" height="70" rx="2" fill="#0f172a"/>
    
    <!-- Code on screen -->
    <text x="12" y="22" font-family="monospace" font-size="8" fill="#10b981">$ deployer apply</text>
    <text x="12" y="35" font-family="monospace" font-size="8" fill="#60a5fa">✓ Validated</text>
    <text x="12" y="48" font-family="monospace" font-size="8" fill="#60a5fa">✓ Building...</text>
    <text x="12" y="61" font-family="monospace" font-size="8" fill="#fbbf24">⟳ Deploying...</text>
    
    <!-- Monitor stand -->
    <rect x="45" y="90" width="30" height="5" fill="#475569"/>
    <rect x="35" y="95" width="50" height="3" fill="#475569"/>
    
    <!-- Keyboard -->
    <rect x="15" y="105" width="90" height="15" rx="2" fill="#64748b"/>
    <line x1="25" y1="110" x2="95" y2="110" stroke="#475569" stroke-width="1"/>
    <line x1="25" y1="115" x2="95" y2="115" stroke="#475569" stroke-width="1"/>
  </g>
  
  <!-- Arrow/Connection -->
  <g transform="translate(250, 220)">
    <!-- Dashed line -->
    <path d="M -40,0 L 40,0" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
    <!-- Arrow head -->
    <path d="M 35,-5 L 45,0 L 35,5 Z" fill="#3b82f6"/>
    
    <!-- Data packets -->
    <circle cx="-20" cy="0" r="3" fill="#10b981">
      <animate attributeName="cx" from="-40" to="40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" cy="0" r="3" fill="#3b82f6">
      <animate attributeName="cx" from="-40" to="40" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Server on right -->
  <g transform="translate(320, 180)">
    <!-- Server rack 1 -->
    <rect x="0" y="0" width="100" height="35" rx="3" fill="url(#serverGradient)" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="10" cy="10" r="3" fill="#10b981"/>
    <circle cx="10" cy="25" r="3" fill="#10b981"/>
    <rect x="20" y="8" width="70" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="15" width="50" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="23" width="60" height="4" rx="2" fill="#1e3a8a"/>
    
    <!-- Server rack 2 -->
    <rect x="0" y="45" width="100" height="35" rx="3" fill="url(#serverGradient)" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="10" cy="55" r="3" fill="#10b981"/>
    <circle cx="10" cy="70" r="3" fill="#fbbf24"/>
    <rect x="20" y="53" width="65" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="60" width="55" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="68" width="70" height="4" rx="2" fill="#1e3a8a"/>
    
    <!-- Server rack 3 -->
    <rect x="0" y="90" width="100" height="35" rx="3" fill="url(#serverGradient)" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="10" cy="100" r="3" fill="#10b981"/>
    <circle cx="10" cy="115" r="3" fill="#10b981"/>
    <rect x="20" y="98" width="60" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="105" width="70" height="4" rx="2" fill="#1e3a8a"/>
    <rect x="20" y="113" width="50" height="4" rx="2" fill="#1e3a8a"/>
  </g>
  
  <!-- Success checkmark -->
  <g transform="translate(370, 160)">
    <circle cx="0" cy="0" r="20" fill="#10b981" opacity="0.9"/>
    <path d="M -8,0 L -3,8 L 10,-8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="370" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#1e293b">Seamless Deployment</text>
</svg>
