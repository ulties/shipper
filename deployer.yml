# Deployer Configuration
# This file defines deployable projects and their deployment profiles

# Provider configurations (credentials, API keys, etc.)
providers:
  ploi:
    api_key: "${PLOI_API_KEY}" # Set via environment variable
    api_url: "https://ploi.io/api"
    server_id: "105556" # Default server ID for all deployments
    deployment_timeout: 60 # Maximum time (in seconds) to wait for deployment to complete

# Projects to deploy
projects:
  # Example Laravel API
  api:
    provider: ploi
    path: ./examples/api
    # Repository configuration
    repository:
      provider: github # github, gitlab, bitbucket, or custom
      name: ulties/deployer-wip # username/repository
    # Site configuration
    web_directory: /public # Default Laravel public directory
    project_root: / # Root of the project
    # Database configuration
    databases:
      main:
        name: "${PROJECT_NAME}_${PROFILE}"
        user: "${PROJECT_NAME}_${PROFILE}"
        type: mysql
    profiles:
      production:
        branch: main
        domain: deployer-wip-api.ulties.dev
      staging:
        branch: develop
        domain: deployer-wip-api-test.ulties.dev
      preview:
        branch: "${GITHUB_HEAD_REF}" # PR branch
        domain: "deployer-wip-api-preview-${GITHUB_PR_NUMBER}.ulties.dev"

  # Example Frontend App
  frontend:
    provider: ploi
    path: ./examples/frontend
    # Repository configuration
    repository:
      provider: github
      name: ulties/deployer-wip
    # Site configuration  
    web_directory: /public
    project_root: /
    profiles:
      production:
        branch: main
        domain: deployer-wip.ulties.dev
      staging:
        branch: develop
        domain: deployer-wip-test.ulties.dev
      preview:
        branch: "${GITHUB_HEAD_REF}"
        domain: "deployer-wip-preview-${GITHUB_PR_NUMBER}.ulties.dev"
